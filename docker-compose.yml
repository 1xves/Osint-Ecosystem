# OSINT Ecosystem Intelligence System
# All services run on a single host (Hetzner GPU VPS or local dev machine)
# Start: docker compose up -d
# Stop:  docker compose down

services:

  # ─── Neo4j — Graph Database ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: osint_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol (Python driver)
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "1g"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── ChromaDB — Vector Database (Entity Resolution) ────────────────────────
  chromadb:
    image: chromadb/chroma:1.0.0
    container_name: osint_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"   # ChromaDB HTTP API (client SDK 1.x requires /api/v2/)
    environment:
      ANONYMIZED_TELEMETRY: "false"
      ALLOW_RESET: "true"
    volumes:
      - chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Redis — Cache + Task Queue ────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: osint_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  chromadb_data:
  redis_data:

networks:
  default:
    name: osint_network
